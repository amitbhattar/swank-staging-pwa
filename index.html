<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="SWANK">
  <meta name="theme-color" content="#3A2D28">
  <meta name="description" content="SWANK Curtains — Price Finder and Estimates">
  <title>SWANK</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-96.png">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; width: 100%; overflow: hidden; background: #FAF7F3; }
    #splash {
      position: fixed; inset: 0; background: #FAF7F3;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 9999; transition: opacity 0.4s ease;
    }
    #splash.hidden { opacity: 0; pointer-events: none; }
    #splash-loader {
      width: 28px; height: 28px;
      border: 2px solid rgba(58,45,40,0.15);
      border-top-color: #C8A882; border-radius: 50%;
      animation: spin 0.8s linear infinite; margin-top: 32px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="splash">
    <img src="/logo.svg" width="320" height="103" alt="SWANK" style="display:block">
    <div id="splash-loader"></div>
  </div>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(function(){});
    }
    // Navigate directly to app.html — cleanest PWA approach
    window.location.href = '/app.html';
  </script>
</body>
</html>
